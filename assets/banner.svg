<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bgModelVaultAI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f3d"/>
      <stop offset="100%" style="stop-color:#0b1730"/>
    </linearGradient>
    <linearGradient id="accModelVaultAI" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1f6f78"/>
      <stop offset="100%" style="stop-color:#f2cb66"/>
    </linearGradient>
    <linearGradient id="mvShieldGrad" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1f6f78"/>
      <stop offset="100%" stop-color="#0f1f3d"/>
    </linearGradient>
    <filter id="glowModelVaultAI" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="gridModelVaultAI" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f6f78" stroke-width="0.5" opacity="0.35"/>
    </pattern>
    <radialGradient id="rgModelVaultAI" cx="85%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#f2cb66;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#0f1f3d;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#bgModelVaultAI)"/>
  <rect width="1280" height="320" fill="url(#gridModelVaultAI)" opacity="0.5"/>
  <rect width="1280" height="320" fill="url(#rgModelVaultAI)"/>
  <rect x="0" y="0" width="1280" height="2" fill="url(#accModelVaultAI)" opacity="0.8"/>
  <rect x="0" y="0" width="4" height="320" fill="url(#accModelVaultAI)"/>

  <!-- Vault mark, scaled 3x from the 32x32 icon (96x96) -->
  <g transform="translate(64, 112)" filter="url(#glowModelVaultAI)">
    <g transform="scale(3)">
      <path d="M16 2.4 L27.2 7.6 V15.6 C27.2 22.9 22.1 28.3 16 30.4 C9.9 28.3 4.8 22.9 4.8 15.6 V7.6 Z"
            fill="url(#mvShieldGrad)" stroke="#f2cb66" stroke-width="1" stroke-linejoin="round"/>
      <polyline points="8.5,19 11.5,19 13.6,12.8 16.2,22.4 18.2,16.6 20.4,16.6 23.5,16.6"
                fill="none" stroke="#f2cb66" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="13.6" cy="12.8" r="1.15" fill="#f2cb66"/>
      <circle cx="16" cy="24.2" r="1.7" fill="#f2cb66" opacity="0.92"/>
      <path d="M14.5 24.7 L17.5 24.7 L16 27.6 Z" fill="#f2cb66" opacity="0.92"/>
    </g>
  </g>

  <text x="184" y="158" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="62" font-weight="700" fill="#f1f5f9" letter-spacing="-2">
    Loan<tspan fill="url(#accModelVaultAI)">Score</tspan>
  </text>

  <text x="186" y="198" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="17" font-weight="400" fill="#7ea3ad" letter-spacing="0.2">
    Post-deployment ML model monitoring  ·  drift detection  ·  health scoring  ·  retraining
  </text>

  <line x1="184" y1="218" x2="820" y2="218" stroke="#1f6f78" stroke-width="1" opacity="0.4"/>

  <g transform="translate(184, 236)">
    <rect width="118" height="34" rx="6" fill="#0b1730" stroke="#1f6f78" stroke-width="1"/>
    <text x="59" y="13" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="9" fill="#5f8990" text-anchor="middle" letter-spacing="1" font-weight="600">PSI/KS</text>
    <text x="59" y="27" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="11" fill="#f2cb66" text-anchor="middle" font-weight="600">drift metrics</text>
  </g>
  <g transform="translate(314, 236)">
    <rect width="118" height="34" rx="6" fill="#0b1730" stroke="#1f6f78" stroke-width="1"/>
    <text x="59" y="13" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="9" fill="#5f8990" text-anchor="middle" letter-spacing="1" font-weight="600">HEALTH SCORE</text>
    <text x="59" y="27" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="11" fill="#f2cb66" text-anchor="middle" font-weight="600">model grading</text>
  </g>
  <g transform="translate(444, 236)">
    <rect width="118" height="34" rx="6" fill="#0b1730" stroke="#1f6f78" stroke-width="1"/>
    <text x="59" y="13" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="9" fill="#5f8990" text-anchor="middle" letter-spacing="1" font-weight="600">RETRAIN</text>
    <text x="59" y="27" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="11" fill="#f2cb66" text-anchor="middle" font-weight="600">triggers</text>
  </g>
  <g transform="translate(574, 236)">
    <rect width="118" height="34" rx="6" fill="#0b1730" stroke="#1f6f78" stroke-width="1"/>
    <text x="59" y="13" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="9" fill="#5f8990" text-anchor="middle" letter-spacing="1" font-weight="600">CREDIT RISK</text>
    <text x="59" y="27" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="11" fill="#f2cb66" text-anchor="middle" font-weight="600">governance</text>
  </g>
</svg>
